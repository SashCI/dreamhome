# Demonstrates: strategy.matrix, ${{ matrix.python-version }} in runs-on and steps
name: Matrix Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: python:${{ matrix.python-version }}
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
    env:
      DJANGO_SETTINGS_MODULE: dreamhome.settings
      PYTHON_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python manage.py test
        env:
          DB_URL: ${{ secrets.DB_URL }}
