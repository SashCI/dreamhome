# Demonstrates: services: (postgres sidecar container), env wiring for DB_URL
name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  integration-test:
    runs-on: python:3.11
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dreamhome
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: dreamhome_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: dreamhome.settings
      DB_URL: postgres://dreamhome:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/dreamhome_test
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply migrations
        run: python manage.py migrate
      - name: Run integration tests
        run: python manage.py test --keepdb
