# Demonstrates: on: push trigger, single job, runs-on, uses: actions/checkout, run: steps
name: CI

on:
  push:
    branches:
      - main
      - develop
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: dreamhome.settings
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: |
          apt-get update -qq && apt-get install -y python3 python3-pip python3-venv
          python3 -m venv /opt/venv
      - name: Install dependencies
        run: /opt/venv/bin/pip install -r requirements.txt
      - name: Run tests
        run: /opt/venv/bin/python manage.py test
        env:
          DB_URL: ${{ secrets.DB_URL }}
