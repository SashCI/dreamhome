# Demonstrates: on: push trigger, single job, runs-on, uses: actions/checkout, run: steps
name: CI

on:
  push:
    branches:
      - main
      - develop
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: |
          apt-get update -qq && apt-get install -y python3 python3-pip python3-venv
          python3 -m venv /opt/venv
      - name: Install test dependencies
        run: /opt/venv/bin/pip install pytest
      - name: Run tests
        run: |
          /opt/venv/bin/python -c "
          import sys, os
          print(f'Python {sys.version}')
          print(f'Working dir: {os.getcwd()}')
          files = os.listdir('.')
          print(f'Repo files: {files}')
          assert 'manage.py' in files, 'manage.py not found in workspace'
          assert 'requirements.txt' in files, 'requirements.txt not found'
          print('All checks passed!')
          "
