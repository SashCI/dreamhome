# Demonstrates: on: push trigger, single job, runs-on, uses: actions/checkout, run: steps
name: CI

on:
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: python:3.11
    env:
      DJANGO_SETTINGS_MODULE: dreamhome.settings
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python manage.py test
        env:
          DB_URL: ${{ secrets.DB_URL }}
