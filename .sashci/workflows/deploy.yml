# Demonstrates: multi-job DAG (needs:), job outputs, conditional if:, secrets via ${{ secrets.X }}
name: Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: python:3.11
    outputs:
      test-result: ${{ steps.run-tests.outputs.result }}
    env:
      DJANGO_SETTINGS_MODULE: dreamhome.settings
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        id: run-tests
        run: |
          python manage.py test
          echo "result=passed" >> $GITHUB_OUTPUT
        env:
          DB_URL: ${{ secrets.DB_URL }}

  build-image:
    runs-on: docker:24
    needs: test
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build Docker image
        run: docker build -t dreamhome:${{ github.sha }} .

  push-image:
    runs-on: docker:24
    needs: build-image
    steps:
      - name: Push to registry
        run: |
          docker tag dreamhome:${{ github.sha }} registry.example.com/dreamhome:${{ needs.build-image.outputs.image-tag }}
          docker push registry.example.com/dreamhome:${{ needs.build-image.outputs.image-tag }}
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}

  deploy:
    runs-on: python:3.11
    needs: push-image
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      DJANGO_SETTINGS_MODULE: dreamhome.settings
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations
        run: python manage.py migrate
        env:
          DB_URL: ${{ secrets.DB_URL }}
      - name: Notify deployment
        run: |
          echo "Deployed image ${{ needs.build-image.outputs.image-tag }} to production"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
