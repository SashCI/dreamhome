# Demonstrates: on: pull_request, branches: filter, paths: filter
name: PR Check

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - '**.py'
      - requirements.txt

jobs:
  lint-and-test:
    runs-on: python:3.11
    env:
      DJANGO_SETTINGS_MODULE: dreamhome.settings
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 . --max-line-length=120
      - name: Run tests
        run: python manage.py test
